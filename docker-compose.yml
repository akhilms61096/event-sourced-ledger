version: '3.8'
services:
  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ledger
      - DB_DRIVER=org.postgresql.Driver
      - DB_USER=ledger
      - DB_PASSWORD=ledger
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
