spring:
  application:
    name: event-sourced-ledger
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ledger;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  sql:
    init:
      mode: always

server:
  port: 8081
